name: Deploy Web

# Only deploy after CI succeeds on main (workflow_run), so a commit that fails
# typecheck/build/test never reaches production. Manual dispatch stays available.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Skip when triggered by a failed CI run; always run on manual dispatch.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @pqp/shared build

      - name: Build client (production)
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          VITE_DEV_AUTH_BYPASS: "false"
        run: pnpm --filter @pqp/client build

      # Install wrangler outside the pnpm workspace (npm + workspace:* fails in client/)
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Missing secret CLOUDFLARE_API_TOKEN. Create a Pages Edit token and run: gh secret set CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Missing secret CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          TMP="$(mktemp -d)"
          cd "$TMP"
          npm init -y >/dev/null
          npm install wrangler@4 --no-fund --no-audit
          npx wrangler pages deploy "$GITHUB_WORKSPACE/client/dist" --project-name=pqp --commit-dirty=true

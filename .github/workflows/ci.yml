name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Install, typecheck, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pqp
          POSTGRES_PASSWORD: pqp
          POSTGRES_DB: pqp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pqp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @pqp/shared build

      - name: Build server
        run: pnpm --filter @pqp/server build

      - name: Test server
        env:
          DATABASE_URL: postgres://pqp:pqp@localhost:5432/pqp
        run: pnpm --filter @pqp/server test

      - name: Typecheck / build client
        env:
          # Publishable key is public; placeholder keeps Vite build green in PRs
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_ci_placeholder' }}
          VITE_DEV_AUTH_BYPASS: "true"
        run: pnpm --filter @pqp/client build
